[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep
lib_deps =
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUHAL_LOG_DEFAULT_LEVEL=3

; ---------------------------------------------------------------------------
; Native unit tests — run on host PC, no hardware required
;   pio test -e native
; ---------------------------------------------------------------------------
[env:native]
platform = native
build_flags =
    -I test/mocks
    -I src
    -std=gnu++11
    -lm
    -DUNIT_TEST
test_build_src = yes
build_src_filter = +<nmea_generator.cpp>
lib_ignore = libcanard
test_filter = test_nmea

; ---------------------------------------------------------------------------
; Embedded unit tests — run on ESP32 with UNIT_TEST flag
;   pio test -e test_embedded
; ---------------------------------------------------------------------------
[env:test_embedded]
extends = env:esp32doit-devkit-v1
build_flags =
    ${env:esp32doit-devkit-v1.build_flags}
    -DUNIT_TEST
test_framework = unity
